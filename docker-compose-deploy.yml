
services:

  # Proxies requests to internal services
  nginx:
    image: nginx:1.24.0
    container_name: t024-nginx
    depends_on:
        - frontend
        - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    networks:
      - app-network

  # generates frontend
  frontend:
    image: "417696335634.dkr.ecr.ap-northeast-1.amazonaws.com/mishkan-frontend:v3.7.0"
    container_name: t024-frontend
    depends_on:
        - backend
    ports:
      - 8080:80
    restart: on-failure
    networks:
      - app-network

  backend:
    image: "417696335634.dkr.ecr.ap-northeast-1.amazonaws.com/mishkan-backend:v3.7.0"
    container_name: t024-backend
    ports:
      - 5001:5001
    environment:
      - FLASK_ENV=production
      - FIREBASE_SERVICE_ACCOUNT_PATH=/run/secrets/firebase_service_account
    secrets:
      - firebase_service_account
    env_file:
      - ./backend_rebuild/.env.production
    restart: on-failure
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

secrets:
  firebase_service_account:
    file: backend_rebuild/secrets/firebase_service_account.json

