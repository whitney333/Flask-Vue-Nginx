services:
  ssh-tunnel:
    image: alpine:3.18
    container_name: t024-ssh-tunnel
    volumes:
      # mount /tmp/MongoDB.pem
      - ./backend_rebuild/MongoDB.pem:/tmp/MongoDB.pem:ro
    env_file:
      - ./backend_rebuild/.env.development
    command: >
      sh -c "
      apk add --no-cache openssh-client &&
      mkdir -p /root/.ssh &&
      cp /tmp/MongoDB.pem /root/.ssh/id_rsa &&
      chmod 600 /root/.ssh/id_rsa &&
      ssh -o StrictHostKeyChecking=no -N -L 0.0.0.0:27999:\$${DB_URI}:27017 \$${SSH_USER}@\$${SSH_HOST} -p 22
      "
    restart: always
    networks:
      - app-network

  # Proxies requests to internal services
  nginx:
    #1.17.10
    image: nginx:1.17.10
    container_name: t024-nginx
    depends_on:
        - frontend
        - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    networks:
      - app-network

  # generates frontend
  frontend:
    image: t024-frontend
    container_name: t024-frontend
    build:
      context: ./frontend_rebuild
    depends_on:
        - backend
    ports:
      # old version port: 8080; rebuild frontend version port: 5173
      - 8080:80
    restart: on-failure
    networks:
      - app-network


  backend:
    image: t024-backend
    container_name: t024-backend
    build:
      context: ./backend_rebuild
    environment:
      - FLASK_ENV=development
      - DB_URI=ssh-tunnel:27999
      - FIREBASE_SERVICE_ACCOUNT_PATH=/run/secrets/firebase_service_account
    secrets:
      - firebase_service_account
    ports:
      - 5001:5001
    env_file:
      - ./backend_rebuild/.env.development
    restart: on-failure
    depends_on:
      # wait for ssh-tunnel to be ready
      - ssh-tunnel
    networks:
      - app-network

networks:
    app-network:
      driver: bridge

secrets:
  firebase_service_account:
    file: backend_rebuild/secrets/firebase_service_account.json
